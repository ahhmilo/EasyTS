<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EasyTS</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:          #0f0f0f;
      --surface:     #181818;
      --surface2:    #1e1e1e;
      --header:      #111111;
      --border:      #252525;
      --border2:     #333333;
      --accent:      #ff4655;
      --accent-dim:  rgba(255,70,85,0.10);
      --accent-glow: rgba(255,70,85,0.22);
      --text:        #e8e8e8;
      --muted:       #7a7a7a;
      --muted2:      #484848;
      --success:     #4ade80;
      --close-hover: #ff4655;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Outfit', sans-serif;
      color: var(--text);
      user-select: none;
    }

    /* ── HEADER ── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 46px;
      padding: 0 12px 0 18px;
      background: var(--header);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #header-left { display: flex; align-items: center; gap: 9px; }

    #logo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      animation: breathe 3s ease-in-out infinite;
    }
    @keyframes breathe {
      0%,100% { box-shadow: 0 0 8px var(--accent); }
      50%      { box-shadow: 0 0 18px var(--accent); }
    }

    #app-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .window-controls { display: flex; gap: 6px; }

    .window-btn {
      width: 28px; height: 28px;
      border-radius: 6px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .window-btn:hover        { background: var(--surface2); color: var(--text); }
    #btn-close:hover         { background: var(--close-hover); border-color: var(--close-hover); color: #fff; }
    .window-btn svg          { width: 11px; height: 11px; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; }

    /* ── SCROLL AREA ── */
    #content {
      display: flex;
      flex-direction: column;
      align-items: center;
      height: calc(100vh - 46px);
      padding: 24px 40px 20px;
      overflow-y: auto;
      overflow-x: hidden;
      gap: 0;
    }
    #content::-webkit-scrollbar { width: 4px; }
    #content::-webkit-scrollbar-track { background: transparent; }
    #content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* ── TITLE ── */
    #title-block { text-align: center; margin-bottom: 18px; flex-shrink: 0; }
    #app-name { font-size: 44px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; }
    #app-name span { color: var(--accent); }
    #app-tagline { margin-top: 7px; font-size: 12px; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }

    /* ── DIVIDER ── */
    .divider { width: 100%; max-width: 560px; height: 1px; background: var(--border); flex-shrink: 0; }

    /* ── SECTION LABEL ── */
    .section-label {
      width: 100%; max-width: 560px;
      display: flex; align-items: center; gap: 7px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted2);
      margin: 16px 0 8px;
      flex-shrink: 0;
    }
    .section-label::before {
      content: ''; display: inline-block;
      width: 4px; height: 4px;
      border-radius: 50%; background: var(--muted2);
    }

    /* ── RESOLUTION INPUT ── */
    .input-wrapper {
      width: 100%; max-width: 560px;
      display: flex; align-items: center;
      height: 48px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
      flex-shrink: 0;
    }
    .input-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .input-wrapper input {
      width: 100%; height: 100%;
      background: transparent; border: none; outline: none;
      font-family: 'Outfit', sans-serif;
      font-size: 14px; color: var(--text);
      user-select: text;
      caret-color: var(--accent);
    }
    .input-wrapper input::placeholder { color: var(--muted2); }

    /* ── START BUTTON ── */
    #btn-start {
      width: 100%; max-width: 560px; height: 46px;
      margin-top: 10px;
      border-radius: 10px; border: none;
      background: var(--accent); color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 14px; font-weight: 600; letter-spacing: 0.04em;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 24px var(--accent-glow);
      flex-shrink: 0;
    }
    #btn-start:hover   { opacity: 0.88; box-shadow: 0 6px 32px var(--accent-glow); }
    #btn-start:active  { transform: scale(0.985); }
    #btn-start:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }
    #btn-start svg     { width: 12px; height: 12px; fill: #fff; }

    /* ── ACCOUNTS LIST ── */
    #accounts-section {
      width: 100%; max-width: 560px;
      flex-shrink: 0;
    }

    #accounts-list { display: flex; flex-direction: column; gap: 6px; }

    .account-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: border-color 0.15s;
    }
    .account-row:hover { border-color: var(--border2); }

    .account-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.6;
      flex-shrink: 0;
    }

    .account-info { flex: 1; min-width: 0; }

    .account-name {
      font-size: 13px; font-weight: 500;
      color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .account-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px; color: var(--muted2);
      margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .account-actions { display: flex; gap: 6px; flex-shrink: 0; }

    .acc-btn {
      height: 28px;
      padding: 0 12px;
      border-radius: 6px;
      border: 1px solid var(--border2);
      background: transparent;
      font-family: 'Outfit', sans-serif;
      font-size: 11px; font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .acc-btn-apply {
      color: var(--accent);
      border-color: rgba(255,70,85,0.3);
    }
    .acc-btn-apply:hover {
      background: var(--accent-dim);
      border-color: var(--accent);
    }
    .acc-btn-apply:disabled { opacity: 0.3; cursor: not-allowed; }

    .acc-btn-restore {
      color: var(--muted);
    }
    .acc-btn-restore:hover:not(:disabled) {
      background: var(--surface2);
      color: var(--text);
      border-color: var(--border2);
    }
    .acc-btn-restore:disabled { opacity: 0.25; cursor: not-allowed; }

    #accounts-empty {
      width: 100%;
      padding: 14px;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--muted2);
      letter-spacing: 0.08em;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: 10px;
    }

    /* ── LOG CONSOLE ── */
    #log-wrap { width: 100%; max-width: 560px; margin-top: 14px; flex-shrink: 0; }

    #log-console {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: #ccc;
      padding: 12px;
      height: 130px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      user-select: text;
    }
    #log-console::-webkit-scrollbar { width: 3px; }
    #log-console::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .log-entry   { margin: 2px 0; line-height: 1.5; }
    .log-success { color: #4ade80; }
    .log-error   { color: #ff6b6b; }
    .log-info    { color: #9cdcfe; }
    .log-muted   { color: var(--muted2); }

    /* ── UPDATE BANNER ── */
    #update-banner {
      display: none;
      width: 100%; max-width: 560px;
      margin-bottom: 10px;
      flex-shrink: 0;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 14px;
      background: rgba(255, 170, 0, 0.07);
      border: 1px solid rgba(255, 170, 0, 0.25);
      border-radius: 10px;
      animation: fadeIn 0.3s ease;
    }
    #update-banner.visible { display: flex; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

    #update-banner-left {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: #cccccc;
      min-width: 0;
    }
    #update-banner-left::before {
      content: '↑';
      font-size: 13px; font-weight: 700;
      color: #ffaa00;
      flex-shrink: 0;
    }
    #update-banner-left span { color: #ffaa00; font-weight: 600; }

    #update-banner-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

    #btn-update-download {
      height: 26px; padding: 0 12px;
      border-radius: 6px;
      border: 1px solid rgba(255,170,0,0.4);
      background: transparent;
      color: #ffaa00;
      font-family: 'Outfit', sans-serif;
      font-size: 11px; font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    #btn-update-download:hover { background: rgba(255,170,0,0.12); }

    #btn-update-dismiss {
      height: 26px; width: 26px;
      border-radius: 6px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--muted2);
      font-size: 14px; line-height: 1;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    #btn-update-dismiss:hover { background: var(--surface2); color: var(--text); }
  </style>
</head>
<body>

  <header id="header">
    <div id="header-left">
      <div id="logo-dot"></div>
      <div id="app-title">EasyTS</div>
    </div>
    <div class="window-controls">
      <button class="window-btn" id="btn-minimize" title="Minimize">
        <svg viewBox="0 0 12 12" fill="none"><line x1="2" y1="6" x2="10" y2="6"/></svg>
      </button>
      <button class="window-btn" id="btn-close" title="Close">
        <svg viewBox="0 0 12 12" fill="none">
          <line x1="1" y1="1" x2="11" y2="11"/>
          <line x1="11" y1="1" x2="1"  y2="11"/>
        </svg>
      </button>
    </div>
  </header>

  <main id="content">

    <div id="title-block">
      <div id="app-name">Easy<span>TS</span></div>
      <div id="app-tagline">True‑Stretched resolution for VALORANT</div>
    </div>

    <div class="divider"></div>

    <!-- Update banner (hidden until version check fires) -->
    <div id="update-banner">
      <div id="update-banner-left">Update available: <span id="update-version"></span> — you are on <span id="current-version-label"></span></div>
      <div id="update-banner-right">
        <button id="btn-update-download">Download</button>
        <button id="btn-update-dismiss">✕</button>
      </div>
    </div>

    <!-- Resolution -->
    <div class="section-label">Resolution</div>
    <div class="input-wrapper">
      <input type="text" id="resolution-input" placeholder="e.g. 1440x1080" autocomplete="off" spellcheck="false"/>
    </div>

    <!-- Start (auto-detect) -->
    <button id="btn-start">
      <svg viewBox="0 0 12 12"><polygon points="2,1 11,6 2,11"/></svg>
      Start — Auto-detect Account
    </button>

    <!-- Saved accounts -->
    <div id="accounts-section">
      <div class="section-label">Saved Accounts</div>
      <div id="accounts-list">
        <div id="accounts-empty">No saved accounts yet. Run Start to add one.</div>
      </div>
    </div>

    <!-- Log -->
    <div id="log-wrap">
      <div class="section-label">Log</div>
      <div id="log-console">
        <div class="log-entry log-muted">> Ready.</div>
      </div>
    </div>

  </main>

  <script>
    const resInput   = document.getElementById('resolution-input');
    const startBtn   = document.getElementById('btn-start');
    const logConsole = document.getElementById('log-console');

    // ── Logging ───────────────────────────────────────────────────────────────
    function addLog(message, type = 'info') {
      const lines = String(message).split('\n');
      lines.forEach(line => {
        if (!line.trim()) return;
        const div = document.createElement('div');
        div.className = `log-entry log-${type}`;
        div.textContent = line;
        logConsole.appendChild(div);
      });
      logConsole.scrollTop = logConsole.scrollHeight;
    }

    window.appendLog = (message, type) => addLog(message, type);

    // ── Button state ──────────────────────────────────────────────────────────
    function setRunning(running) {
      startBtn.disabled = running;
      document.querySelectorAll('.acc-btn').forEach(b => b.disabled = running);
    }

    // ── Accounts list ─────────────────────────────────────────────────────────
    async function refreshAccounts() {
      const accounts = await window.pywebview.api.get_accounts();
      const list     = document.getElementById('accounts-list');
      list.innerHTML  = '';

      if (!accounts || accounts.length === 0) {
        list.innerHTML = '<div id="accounts-empty">No saved accounts yet. Run Start to add one.</div>';
        return;
      }

      accounts.forEach(acc => {
        const row = document.createElement('div');
        row.className = 'account-row';

        const hasBackup = !!acc.backup_date;
        const metaText  = `Last applied: ${acc.last_applied || '—'}${hasBackup ? '  ·  Backup: ' + acc.backup_date : ''}`;

        row.innerHTML = `
          <div class="account-dot"></div>
          <div class="account-info">
            <div class="account-name">${acc.name_tag}</div>
            <div class="account-meta">${metaText}</div>
          </div>
          <div class="account-actions">
            <button class="acc-btn acc-btn-apply" data-folder="${acc.folder}">Apply</button>
            <button class="acc-btn acc-btn-restore" data-folder="${acc.folder}" ${!hasBackup ? 'disabled title="No backup available"' : 'title="Restore backup from ' + acc.backup_date + '"'}>Restore</button>
          </div>
        `;

        row.querySelector('.acc-btn-apply').addEventListener('click', () => applyToSaved(acc.folder));
        row.querySelector('.acc-btn-restore').addEventListener('click', () => restoreAccount(acc.folder));
        list.appendChild(row);
      });
    }

    window.refreshAccounts = refreshAccounts;

    // ── Apply (auto-detect) ───────────────────────────────────────────────────
    startBtn.addEventListener('click', async () => {
      const resolution = resInput.value.trim();
      if (!resolution) { addLog('Please enter a resolution.', 'error'); return; }
      if (!/^\d{3,4}x\d{3,4}$/i.test(resolution)) { addLog('Invalid format. Use WIDTHxHEIGHT (e.g. 1440x1080)', 'error'); return; }

      logConsole.innerHTML = '';
      addLog(`Starting with resolution ${resolution}...`, 'info');
      setRunning(true);
      try {
        await window.pywebview.api.apply_stretched(resolution);
      } catch(err) {
        addLog(`Exception: ${err.message || err}`, 'error');
      } finally {
        setRunning(false);
      }
    });

    // ── Apply to saved ────────────────────────────────────────────────────────
    async function applyToSaved(folder) {
      const resolution = resInput.value.trim();
      if (!resolution) { addLog('Please enter a resolution first.', 'error'); return; }
      if (!/^\d{3,4}x\d{3,4}$/i.test(resolution)) { addLog('Invalid format. Use WIDTHxHEIGHT (e.g. 1440x1080)', 'error'); return; }

      logConsole.innerHTML = '';
      addLog(`Applying ${resolution} to saved account...`, 'info');
      setRunning(true);
      try {
        await window.pywebview.api.apply_to_saved(folder, resolution);
      } catch(err) {
        addLog(`Exception: ${err.message || err}`, 'error');
      } finally {
        setRunning(false);
      }
    }

    // ── Restore ───────────────────────────────────────────────────────────────
    async function restoreAccount(folder) {
      logConsole.innerHTML = '';
      addLog('Restoring backup...', 'info');
      setRunning(true);
      try {
        await window.pywebview.api.restore_account(folder);
      } catch(err) {
        addLog(`Exception: ${err.message || err}`, 'error');
      } finally {
        setRunning(false);
      }
    }

    // ── Window controls ───────────────────────────────────────────────────────
    document.getElementById('btn-minimize').addEventListener('click', () => window.pywebview.api.minimize());
    document.getElementById('btn-close').addEventListener('click',    () => window.pywebview.api.close());

    // ── Update banner ─────────────────────────────────────────────────────────
    const RELEASES_PAGE = "https://github.com/ahhmilo/EasyTS/releases/latest";
    const RELEASES_API  = "https://api.github.com/repos/ahhmilo/EasyTS/releases/latest";

    function showUpdateBanner(latestVersion, currentVersion, isOld) {
      const label = document.getElementById('update-version');
      const curr  = document.getElementById('current-version-label');
      const banner = document.getElementById('update-banner');

      if (isOld) {
        label.textContent = latestVersion;
        curr.textContent  = "outdated version";
        // Swap banner text for old-version case
        document.getElementById('update-banner-left').innerHTML =
          '⚠ You are using an <span>outdated version</span> of EasyTS. We strongly recommend updating to <span>' + latestVersion + '</span>.';
      } else {
        label.textContent = latestVersion;
        curr.textContent  = currentVersion;
      }

      banner.classList.add('visible');
      document.getElementById('btn-update-download').onclick = () => window.pywebview.api.open_url(RELEASES_PAGE);
      document.getElementById('btn-update-dismiss').onclick  = () => banner.classList.remove('visible');
    }

    async function checkVersion() {
      try {
        // Fetch latest release from GitHub
        const resp   = await fetch(RELEASES_API, { headers: { "User-Agent": "EasyTS" } });
        const data   = await resp.json();
        const latest = data.tag_name;
        if (!latest) return;

        // Try to get version from the exe — old exes won't have this method
        let current = null;
        try {
          current = await window.pywebview.api.get_version();
        } catch(e) {
          current = null;
        }

        if (!current) {
          // Old exe — no get_version() method
          showUpdateBanner(latest, null, true);
        } else if (current !== latest) {
          // New exe but outdated version
          showUpdateBanner(latest, current, false);
        }
        // If current === latest, do nothing
      } catch(e) {
        // No internet or API failed — silently ignore
      }
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    window.addEventListener('pywebviewready', () => {
      refreshAccounts();
      checkVersion();
    });
  </script>

</body>
</html>
